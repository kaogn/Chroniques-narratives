# Configuration du service backend (FastAPI).
# Ce fichier s'applique au service dont le rootDirectory est la racine du dépôt
# (le service frontend, sous apps/frontend, a sa propre config côté Railway).

[build]
builder = "RAILPACK"

[deploy]
startCommand = "uvicorn apps.api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
